<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#1976d2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rule Toggle">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>MikroTik Rule Toggle</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; padding: 12px; padding-top: env(safe-area-inset-top, 12px); overscroll-behavior-y: contain; }
  .pull-indicator { text-align: center; color: #999; font-size: .8em; overflow: hidden; height: 0; opacity: 0; }
  .pull-indicator.collapsing { transition: height .2s ease-out, opacity .2s ease-out; }
  .container { max-width: 600px; margin: 0 auto; }
  h1 { margin-bottom: 12px; font-size: 1.3em; }

  /* --- Card --- */
  .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 12px; margin-bottom: 10px; border-left: 4px solid transparent; transition: all .2s; }
  .card.active { border-left-color: #e53935; background: #fff5f5; }
  .card.inactive { border-left-color: #4caf50; background: #f5fff5; }
  .card.timed { border-left-color: #ff9800; background: #fff8e1; }

  .card-top { display: flex; align-items: center; gap: 10px; }
  .card .info { flex: 1; min-width: 0; }
  .card .name { font-weight: 600; font-size: .85em; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .desc { color: #666; font-size: .8em; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .badge-row { margin-top: 4px; }

  .status-badge { font-size: .65em; font-weight: 700; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; display: inline-block; }
  .status-badge.blocked { background: #ffebee; color: #c62828; }
  .status-badge.allowed { background: #e8f5e9; color: #2e7d32; }
  .status-badge.timer { background: #fff3e0; color: #e65100; }

  .type-label { font-size: .6em; color: #9e9e9e; margin-left: 4px; }

  /* --- Toggle --- */
  .toggle { position: relative; width: 48px; height: 28px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; inset: 0; background: #4caf50; border-radius: 28px; cursor: pointer; transition: .2s; }
  .toggle .slider::before { content: ""; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .toggle input:checked + .slider { background: #e53935; }
  .toggle input:checked + .slider::before { transform: translateX(20px); }

  .delete-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 1.1em; padding: 4px; flex-shrink: 0; }
  .delete-btn:hover, .delete-btn:active { color: #e53935; }

  /* --- Timer buttons --- */
  .timer-row { display: flex; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; align-items: center; }
  .timer-row button { background: #ff9800; color: #fff; border: none; padding: 4px 0; border-radius: 4px; cursor: pointer; font-size: .7em; font-weight: 500; white-space: nowrap; flex: 1; text-align: center; margin: 0 2px; }
  .timer-row button:active { background: #e68900; }
  .timer-row.timer-active { justify-content: flex-start; gap: 10px; }
  .timer-row.timer-active button.cancel { flex: none; padding: 4px 12px; background: #999; }
  .timer-row.timer-active button.cancel:active { background: #777; }
  .timer-row .countdown { font-size: .85em; color: #e65100; font-weight: 600; font-variant-numeric: tabular-nums; flex: 1; }
  .timer-row .countdown.pending { color: #999; font-weight: 500; }
  .timer-row.extend-row { border-top: none; padding-top: 4px; margin-top: 0; }
  .timer-row.extend-row button { background: #ffe0b2; color: #e65100; font-size: .65em; padding: 3px 0; }

  /* --- Legend --- */
  .legend { display: flex; gap: 12px; margin-bottom: 12px; font-size: .75em; color: #888; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .legend-dot.red { background: #e53935; }
  .legend-dot.green { background: #4caf50; }
  .legend-dot.orange { background: #ff9800; }

  /* --- Router status --- */
  .router-status { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 10px 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: .8em; flex-wrap: wrap; }
  .router-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .router-dot.online { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
  .router-dot.warning { background: #ff9800; box-shadow: 0 0 6px #ff9800; }
  .router-dot.offline { background: #e53935; box-shadow: 0 0 6px #e53935; }
  .router-dot.unknown { background: #9e9e9e; }
  .router-label { font-weight: 600; }
  .router-detail { color: #666; }
  .script-warn { display: block; color: #c62828; font-size: .75em; margin-top: 4px; font-weight: 500; }

  /* --- Add form / Token --- */
  .add-form { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); padding: 12px; margin-top: 16px; }
  .add-form input { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 6px; font-size: .9em; }
  .add-form button { background: #1976d2; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: .9em; width: 100%; }
  .add-form button:active { background: #1565c0; }
  #token-bar { display: flex; align-items: center; gap: 6px; }
  #token-bar input { flex: 1; padding: 6px 8px; border: 1px solid #ddd; border-radius: 6px; font-family: monospace; font-size: .85em; }
  #token-bar button { background: #ff9800; color: #fff; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }

  .empty { text-align: center; color: #999; padding: 30px 0; }
  .log-list { list-style: none; padding: 0; margin-top: 8px; }
  .log-list li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: .8em; display: flex; gap: 8px; align-items: baseline; }
  .log-list li:last-child { border-bottom: none; }
  .log-time { color: #999; font-size: .9em; white-space: nowrap; flex-shrink: 0; }
  .log-param { font-weight: 600; font-family: monospace; }
  .log-action { color: #666; }
  .stats-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 10px; }
  .stat-card { background: #f9f9f9; border-radius: 6px; padding: 10px; }
  .stat-card .stat-name { font-weight: 600; font-family: monospace; font-size: .9em; margin-bottom: 6px; }
  .stat-row { display: flex; justify-content: space-between; font-size: .8em; color: #666; padding: 2px 0; }
  .stat-row .val { font-weight: 600; color: #333; }
  .stat-timers { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .stat-timers span { background: #fff3e0; color: #e65100; font-size: .7em; padding: 2px 6px; border-radius: 3px; }

  /* --- Stats tabs & chart --- */
  .stats-tabs { display: flex; gap: 4px; margin-top: 10px; margin-bottom: 10px; }
  .stats-tabs button { background: #eee; border: none; padding: 5px 12px; border-radius: 4px; font-size: .8em; cursor: pointer; font-weight: 500; }
  .stats-tabs button.active { background: #1976d2; color: #fff; }
  .chart-card { background: #f9f9f9; border-radius: 6px; padding: 10px; margin-bottom: 8px; }
  .chart-card .chart-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .chart-card .chart-name { font-weight: 600; font-family: monospace; font-size: .9em; }
  .chart-card .chart-summary { font-size: .75em; color: #666; }
  .chart-bars { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .chart-bar { width: 100%; min-width: 3px; background: #ff9800; border-radius: 2px 2px 0 0; transition: height .2s; }
  .chart-bar.zero { background: #e0e0e0; min-height: 2px; }
  .chart-labels { display: flex; gap: 2px; margin-top: 2px; }
  .chart-labels span { flex: 1; text-align: center; font-size: .55em; color: #999; overflow: hidden; }
  .chart-empty { text-align: center; color: #999; font-size: .85em; padding: 16px 0; }
</style>
</head>
<body>
<div class="container">
  <div id="pull-indicator" class="pull-indicator"></div>
  <h1>MikroTik Rule Toggle</h1>

  <div id="params"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot red"></div> Заблокировано</div>
    <div class="legend-item"><div class="legend-dot green"></div> Разрешено</div>
    <div class="legend-item"><div class="legend-dot orange"></div> Временно</div>
  </div>

  <div id="router-status" class="router-status">
    <div class="router-dot unknown"></div>
    <span class="router-label">Роутер:</span>
    <span class="router-detail">ожидание...</span>
  </div>

  <details class="add-form" id="log-section">
    <summary style="cursor:pointer;font-weight:600;font-size:.95em">История</summary>
    <ul class="log-list" id="log-list"></ul>
  </details>

  <details class="add-form" id="stats-section">
    <summary style="cursor:pointer;font-weight:600;font-size:.95em">Статистика</summary>
    <div class="stats-tabs" id="stats-tabs">
      <button onclick="loadStats(1)" data-days="1">1 день</button>
      <button onclick="loadStats(7)" data-days="7" class="active">7 дней</button>
      <button onclick="loadStats(30)" data-days="30">30 дней</button>
    </div>
    <div class="stats-grid" id="stats-grid"></div>
  </details>

  <details class="add-form">
    <summary style="cursor:pointer;font-weight:600;font-size:.95em">Добавить параметр</summary>
    <div style="margin-top:10px">
      <div style="display:flex;align-items:center;gap:0;margin-bottom:6px">
        <span style="background:#eee;padding:8px 8px;border:1px solid #ddd;border-right:none;border-radius:6px 0 0 6px;font-family:monospace;font-size:.9em;color:#666;white-space:nowrap">hook:</span>
        <input type="text" id="new-name" placeholder="block-social" style="margin:0;border-radius:0 6px 6px 0;flex:1" />
      </div>
      <input type="text" id="new-desc" placeholder="Описание" />
      <label style="display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:.85em;cursor:pointer">
        <input type="checkbox" id="new-inverted" /> Kid-control (инверт. логика)
      </label>
      <button onclick="addParam()">Добавить</button>
    </div>
  </details>

  <details style="margin-top:10px">
    <summary style="cursor:pointer;font-size:.8em;color:#999">Token</summary>
    <div id="token-bar" style="margin-top:6px">
      <input type="password" id="token" placeholder="Bearer token" />
      <button onclick="saveToken()">OK</button>
    </div>
  </details>
</div>

<script>
let authToken = localStorage.getItem("hook-token") || "";
let currentParams = {};
document.getElementById("token").value = authToken;

function saveToken() {
  authToken = document.getElementById("token").value;
  localStorage.setItem("hook-token", authToken);
  loadState();
}

function headers() {
  const h = {"Content-Type": "application/json"};
  if (authToken) h["Authorization"] = "Bearer " + authToken;
  return h;
}

async function loadState() {
  try {
    const res = await fetch("/api/state", {headers: headers()});
    if (!res.ok) { document.getElementById("params").innerHTML = '<div class="empty">Ошибка: ' + res.status + '</div>'; return; }
    const data = await res.json();
    currentParams = data.params || {};
    render(currentParams);
  } catch (e) {
    document.getElementById("params").innerHTML = '<div class="empty">Не удалось подключиться</div>';
  }
}

function formatCountdown(seconds) {
  if (seconds <= 0) return "0:00";
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return h + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  return m + ":" + String(s).padStart(2, "0");
}

function render(params) {
  const el = document.getElementById("params");
  const keys = Object.keys(params).sort();
  if (!keys.length) { el.innerHTML = '<div class="empty">Нет параметров</div>'; return; }
  el.innerHTML = keys.map(k => {
    const p = params[k];
    const inv = p.inverted;
    const hasPending = p.timer_duration && !p.disabled_until;
    const hasTimer = (p.disabled_until || hasPending) && (inv ? p.enabled : !p.enabled);

    let stateClass, badgeClass, badgeText;
    if (hasTimer) {
      stateClass = "timed";
      badgeClass = "timer";
      badgeText = inv ? "врем. выключен" : "врем. разрешено";
    } else if (p.enabled) {
      stateClass = inv ? "inactive" : "active";
      badgeClass = inv ? "allowed" : "blocked";
      badgeText = inv ? "выключен" : "заблокир.";
    } else {
      stateClass = inv ? "active" : "inactive";
      badgeClass = inv ? "blocked" : "allowed";
      badgeText = inv ? "включён" : "разрешено";
    }

    const toggleTitle = inv
      ? (p.enabled ? "Включить" : "Выключить")
      : (p.enabled ? "Разрешить трафик" : "Заблокировать трафик");

    const showTimerButtons = inv ? !p.enabled : p.enabled;

    let timerRow = "";
    if (hasPending) {
      timerRow = `<div class="timer-row timer-active">
        <span class="countdown pending">ожидание роутера…</span>
        <button class="cancel" onclick="cancelTimer('${esc(k)}')">Отмена</button>
      </div>`;
    } else if (hasTimer) {
      timerRow = `<div class="timer-row timer-active">
        <span class="countdown" data-until="${p.disabled_until}"></span>
        <button class="cancel" onclick="cancelTimer('${esc(k)}')">Вернуть</button>
      </div>
      <div class="timer-row extend-row">
        <button onclick="setTimer('${esc(k)}', 5)">+5м</button>
        <button onclick="setTimer('${esc(k)}', 15)">+15м</button>
        <button onclick="setTimer('${esc(k)}', 30)">+30м</button>
        <button onclick="setTimer('${esc(k)}', 60)">+1ч</button>
        <button onclick="setTimer('${esc(k)}', 180)">+3ч</button>
      </div>`;
    } else if (showTimerButtons) {
      timerRow = `<div class="timer-row">
        <button onclick="setTimer('${esc(k)}', 5)">5м</button>
        <button onclick="setTimer('${esc(k)}', 15)">15м</button>
        <button onclick="setTimer('${esc(k)}', 30)">30м</button>
        <button onclick="setTimer('${esc(k)}', 60)">1ч</button>
        <button onclick="setTimer('${esc(k)}', 180)">3ч</button>
        <button onclick="setTimer('${esc(k)}', 360)">6ч</button>
        ${untilBtn(k, 20, 'до 20:00')}
        ${untilBtn(k, 23, 'до 23:00')}
      </div>`;
    }

    const typeLabel = inv ? '<span class="type-label">kid-control</span>' : '';

    return `<div class="card ${stateClass}">
      <div class="card-top">
        <div class="info">
          <div class="name">${esc(k)}${typeLabel}</div>
          <div class="desc">${esc(p.description)}</div>
          <div class="badge-row"><span class="status-badge ${badgeClass}">${badgeText}</span></div>
        </div>
        <label class="toggle" title="${toggleTitle}"><input type="checkbox" ${p.enabled ? "checked" : ""} onchange="toggle('${esc(k)}', this.checked)"><span class="slider"></span></label>
        <button class="delete-btn" onclick="deleteParam('${esc(k)}')" title="Удалить">&times;</button>
      </div>
      ${timerRow}
    </div>`;
  }).join("");
  updateCountdowns();
}

function untilBtn(name, hour, label) {
  const now = new Date();
  const target = new Date(now);
  target.setHours(hour, 0, 0, 0);
  if (target <= now) return "";
  const mins = Math.round((target - now) / 60000);
  if (mins < 5) return "";
  return `<button onclick="setTimer('${esc(name)}', ${mins})">${label}</button>`;
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

async function toggle(name, enabled) {
  const res = await fetch("/api/state", {method: "POST", headers: headers(), body: JSON.stringify({name, enabled})});
  if (res.ok) { const data = await res.json(); currentParams = data.params || {}; render(currentParams); }
}

async function setTimer(name, minutes) {
  const res = await fetch("/api/timer", {method: "POST", headers: headers(), body: JSON.stringify({name, minutes})});
  if (res.ok) { const data = await res.json(); currentParams = data.params || {}; render(currentParams); }
}

async function cancelTimer(name) {
  const p = currentParams[name];
  const restoreEnabled = p && p.inverted ? false : true;
  const res = await fetch("/api/state", {method: "POST", headers: headers(), body: JSON.stringify({name, enabled: restoreEnabled})});
  if (res.ok) { const data = await res.json(); currentParams = data.params || {}; render(currentParams); }
}

async function addParam() {
  const name = document.getElementById("new-name").value.trim();
  const description = document.getElementById("new-desc").value.trim();
  const inverted = document.getElementById("new-inverted").checked;
  if (!name) return;
  const res = await fetch("/api/params", {method: "POST", headers: headers(), body: JSON.stringify({name, description, inverted})});
  if (res.ok) {
    const data = await res.json(); currentParams = data.params || {}; render(currentParams);
    document.getElementById("new-name").value = "";
    document.getElementById("new-desc").value = "";
    document.getElementById("new-inverted").checked = false;
  }
}

async function deleteParam(name) {
  if (!confirm("Удалить параметр " + name + "?")) return;
  const res = await fetch("/api/params?name=" + encodeURIComponent(name), {method: "DELETE", headers: headers()});
  if (res.ok) { const data = await res.json(); currentParams = data.params || {}; render(currentParams); }
}

function updateCountdowns() {
  const els = document.querySelectorAll(".countdown[data-until]");
  const now = Math.floor(Date.now() / 1000);
  els.forEach(el => {
    const until = parseInt(el.dataset.until);
    const remaining = until - now;
    if (remaining <= 0) {
      loadState();
    } else {
      el.textContent = formatCountdown(remaining);
    }
  });
}

function formatAge(sec) {
  if (sec < 60) return sec + " сек назад";
  if (sec < 3600) return Math.floor(sec / 60) + " мин назад";
  if (sec < 86400) return Math.floor(sec / 3600) + " ч назад";
  return Math.floor(sec / 86400) + " дн назад";
}

async function loadHeartbeat() {
  const el = document.getElementById("router-status");
  try {
    const res = await fetch("/api/heartbeat", {headers: headers()});
    if (!res.ok) return;
    const data = await res.json();
    if (!data.last_seen) {
      el.innerHTML = '<div class="router-dot unknown"></div><span class="router-label">Роутер:</span> <span class="router-detail">ещё не подключался</span>';
      return;
    }
    const age = data.age_sec;
    const lastDate = new Date(data.last_seen * 1000);
    const lastTime = String(lastDate.getHours()).padStart(2,"0") + ":" + String(lastDate.getMinutes()).padStart(2,"0") + ":" + String(lastDate.getSeconds()).padStart(2,"0");
    let dotClass, statusText;
    if (age < 120) {
      dotClass = "online";
      statusText = "онлайн · " + lastTime;
    } else if (age < 600) {
      dotClass = "warning";
      statusText = "был " + formatAge(age) + " · " + lastTime;
    } else {
      dotClass = "offline";
      statusText = "нет связи · " + formatAge(age) + " · " + lastTime;
    }
    const scriptWarn = data.script_outdated ? '<span class="script-warn">⚠ Скрипт на роутере устарел — обновите remote-hook.rsc</span>' : '';
    el.innerHTML = `<div class="router-dot ${dotClass}"></div><span class="router-label">Роутер:</span> <span class="router-detail">${statusText}</span>${scriptWarn}`;
  } catch(e) {}
}

async function loadLog() {
  try {
    const res = await fetch("/api/log", {headers: headers()});
    if (!res.ok) return;
    const entries = await res.json();
    const el = document.getElementById("log-list");
    if (!entries || !entries.length) { el.innerHTML = '<li style="color:#999">Пока пусто</li>'; return; }
    el.innerHTML = entries.map(e => {
      const d = new Date(e.time * 1000);
      const t = String(d.getDate()).padStart(2,"0") + "." + String(d.getMonth()+1).padStart(2,"0") + " " + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
      return `<li><span class="log-time">${t}</span> <span class="log-param">${esc(e.param)}</span> <span class="log-action">${esc(e.detail)}</span></li>`;
    }).join("");
  } catch(e) {}
}

let currentStatsDays = 7;

async function loadStats(days) {
  if (days) currentStatsDays = days;
  // Update active tab
  document.querySelectorAll("#stats-tabs button").forEach(b => {
    b.classList.toggle("active", parseInt(b.dataset.days) === currentStatsDays);
  });
  try {
    const res = await fetch("/api/stats?days=" + currentStatsDays, {headers: headers()});
    if (!res.ok) return;
    const data = await res.json();
    const el = document.getElementById("stats-grid");
    const params = Object.keys(data.by_param || {}).sort();
    if (!params.length) { el.innerHTML = '<div class="chart-empty">Нет данных за этот период</div>'; return; }
    el.innerHTML = params.map(k => {
      const p = data.by_param[k];
      const days = p.days || [];
      const maxCount = Math.max(...days.map(d => d.count), 1);
      const totalH = Math.floor(p.total_minutes / 60);
      const totalM = p.total_minutes % 60;
      const timeStr = totalH > 0 ? totalH + "ч " + totalM + "м" : totalM + " мин";

      const barsHtml = days.map(d => {
        const h = d.count > 0 ? Math.max(8, Math.round((d.count / maxCount) * 56)) : 0;
        const cls = d.count > 0 ? "chart-bar" : "chart-bar zero";
        const title = formatDateShort(d.date) + ": " + d.count + " раз";
        return `<div class="chart-bar-wrap"><div class="${cls}" style="height:${h}px" title="${title}"></div></div>`;
      }).join("");

      // Labels: show some dates
      const labelsHtml = days.map((d, i) => {
        const show = days.length <= 7 || i === 0 || i === days.length - 1 || i === Math.floor(days.length / 2);
        return `<span>${show ? formatDateShort(d.date) : ""}</span>`;
      }).join("");

      return `<div class="chart-card">
        <div class="chart-header">
          <span class="chart-name">${esc(k)}</span>
          <span class="chart-summary">${p.total_timers} раз · ${timeStr}</span>
        </div>
        <div class="chart-bars">${barsHtml}</div>
        <div class="chart-labels">${labelsHtml}</div>
      </div>`;
    }).join("");
  } catch(e) {}
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return String(d.getDate()).padStart(2,"0") + "." + String(d.getMonth()+1).padStart(2,"0");
}

// Load log/stats when details is opened
document.getElementById("log-section").addEventListener("toggle", function() {
  if (this.open) loadLog();
});
document.getElementById("stats-section").addEventListener("toggle", function() {
  if (this.open) loadStats();
});

setInterval(updateCountdowns, 1000);
setInterval(loadState, 30000);
setInterval(loadHeartbeat, 10000);

loadState();
loadHeartbeat();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(function(){});
}

// Pull-to-refresh
(function() {
  let startY = 0;
  let dy = 0;
  let pulling = false;
  let refreshing = false;
  const indicator = document.getElementById("pull-indicator");
  const container = document.querySelector(".container");

  container.addEventListener("touchstart", function(e) {
    if (refreshing) return;
    var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    if (scrollTop <= 0) {
      startY = e.touches[0].pageY;
      pulling = true;
      dy = 0;
      indicator.classList.remove("collapsing");
    }
  }, {passive: true});

  container.addEventListener("touchmove", function(e) {
    if (!pulling || refreshing) return;
    dy = e.touches[0].pageY - startY;
    if (dy > 10) {
      var h = Math.min(dy * 0.5, 50);
      indicator.style.height = h + "px";
      indicator.style.opacity = "1";
      indicator.style.lineHeight = h + "px";
      if (dy > 80) {
        indicator.textContent = "\u2191 Отпустите для обновления";
        indicator.style.color = "#1976d2";
        indicator.style.fontWeight = "600";
      } else {
        indicator.textContent = "\u2193 Потяните для обновления";
        indicator.style.color = "#999";
        indicator.style.fontWeight = "400";
      }
    }
  }, {passive: true});

  container.addEventListener("touchend", function() {
    if (!pulling || refreshing) return;
    pulling = false;
    if (dy > 80) {
      refreshing = true;
      indicator.textContent = "Обновление...";
      indicator.style.height = "36px";
      indicator.style.opacity = "1";
      indicator.style.lineHeight = "36px";
      indicator.style.color = "#1976d2";
      indicator.style.fontWeight = "600";
      Promise.all([loadState(), loadHeartbeat()]).finally(function() {
        indicator.classList.add("collapsing");
        indicator.style.height = "0";
        indicator.style.opacity = "0";
        indicator.style.fontWeight = "";
        indicator.style.color = "";
        refreshing = false;
      });
    } else {
      indicator.classList.add("collapsing");
      indicator.style.height = "0";
      indicator.style.opacity = "0";
      indicator.style.fontWeight = "";
      indicator.style.color = "";
    }
    dy = 0;
  }, {passive: true});
})();
</script>
