<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#F2F2F7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rule Toggle">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/icon-192.svg">
<title>Rule Toggle</title>
<style>
  :root {
    --bg: #F2F2F7;
    --card: #FFFFFF;
    --blue: #007AFF;
    --red: #FF3B30;
    --green: #34C759;
    --orange: #FF9500;
    --text1: #000000;
    --text2: rgba(60,60,67,.6);
    --text3: rgba(60,60,67,.3);
    --sep: rgba(60,60,67,.12);
    --card-active-bg: rgba(255,59,48,.05);
    --card-inactive-bg: rgba(52,199,89,.05);
    --card-timed-bg: rgba(255,149,0,.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --card: #1C1C1E;
      --text1: #FFFFFF;
      --text2: rgba(235,235,245,.6);
      --text3: rgba(235,235,245,.3);
      --sep: rgba(84,84,88,.36);
      --card-active-bg: rgba(255,59,48,.1);
      --card-inactive-bg: rgba(52,199,89,.08);
      --card-timed-bg: rgba(255,149,0,.1);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: var(--bg);
    color: var(--text1);
    padding: 0 16px;
    padding-top: calc(env(safe-area-inset-top) + 12px);
    padding-bottom: max(env(safe-area-inset-bottom), 32px);
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 600px; margin: 0 auto; }

  /* Pull indicator */
  .pull-indicator {
    text-align: center;
    color: var(--text3);
    font-size: 13px;
    overflow: hidden;
    height: 0;
    opacity: 0;
    -webkit-user-select: none;
    user-select: none;
  }
  .pull-indicator.collapsing { transition: height .2s ease-out, opacity .2s ease-out; }

  /* Header */
  h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -.4px;
    margin: 10px 4px 14px;
    color: var(--text1);
  }

  /* Router status */
  .router-status {
    background: var(--card);
    border-radius: 12px;
    padding: 11px 14px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    flex-wrap: wrap;
    box-shadow: 0 1px 0 var(--sep);
  }
  .router-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .router-dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .router-dot.warning { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .router-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .router-dot.unknown { background: var(--text3); }
  .router-label { font-weight: 600; }
  .router-detail { color: var(--text2); }
  .script-warn { display: block; color: var(--red); font-size: 12px; margin-top: 4px; font-weight: 600; width: 100%; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 8px;
    box-shadow: 0 1px 0 var(--sep);
  }
  .card.active   { background: color-mix(in srgb, var(--card), #FF3B30 5%); }
  .card.inactive { background: color-mix(in srgb, var(--card), #34C759 5%); }
  .card.timed    { background: color-mix(in srgb, var(--card), #FF9500 7%); }
  @supports not (background: color-mix(in srgb, white, red)) {
    .card.active   { background: var(--card-active-bg); }
    .card.inactive { background: var(--card-inactive-bg); }
    .card.timed    { background: var(--card-timed-bg); }
  }

  .card-top { display: flex; align-items: center; gap: 12px; }
  .card .info { flex: 1; min-width: 0; }

  .card .name {
    font-size: 15px;
    font-weight: 600;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text1);
  }
  .card .desc {
    font-size: 13px;
    color: var(--text2);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card .badge-row { margin-top: 8px; }

  .status-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .2px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
    display: inline-block;
  }
  .status-badge.blocked { background: rgba(255,59,48,.12); color: var(--red); }
  .status-badge.allowed { background: rgba(52,199,89,.12); color: var(--green); }
  .status-badge.timer   { background: rgba(255,149,0,.12); color: var(--orange); }

  .type-label {
    font-size: 11px;
    color: var(--text3);
    font-family: -apple-system, sans-serif;
    font-weight: 400;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* iOS-style toggle */
  .toggle { position: relative; width: 51px; height: 31px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle .slider {
    position: absolute; inset: 0;
    background: var(--green);
    border-radius: 31px;
    cursor: pointer;
    transition: background .2s;
  }
  .toggle .slider::before {
    content: "";
    position: absolute;
    width: 27px; height: 27px;
    left: 2px; top: 2px;
    background: #fff;
    border-radius: 50%;
    transition: transform .25s cubic-bezier(.33,1,.68,1);
    box-shadow: 0 2px 6px rgba(0,0,0,.25), 0 .5px 1px rgba(0,0,0,.12);
  }
  .toggle input:checked + .slider { background: var(--red); }
  .toggle input:checked + .slider::before { transform: translateX(20px); }

  .delete-btn {
    background: none; border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 20px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border-radius: 50%;
    line-height: 1;
  }
  .delete-btn:active { background: rgba(60,60,67,.1); color: var(--red); }

  /* Timer rows */
  .timer-row {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--sep);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .timer-row::-webkit-scrollbar { display: none; }

  .timer-row button {
    background: rgba(255,149,0,.12);
    color: var(--orange);
    border: none;
    padding: 0 14px;
    height: 34px;
    border-radius: 17px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: -apple-system, sans-serif;
  }
  .timer-row button:active { opacity: .6; }

  .timer-row.timer-active { align-items: center; flex-wrap: nowrap; }
  .timer-row.timer-active button.cancel {
    background: rgba(60,60,67,.1);
    color: var(--text2);
  }

  .timer-row .countdown {
    font-size: 17px;
    color: var(--orange);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    flex: 1;
    white-space: nowrap;
  }
  .timer-row .countdown.pending {
    color: var(--text2);
    font-weight: 400;
    font-size: 14px;
  }

  .timer-row.extend-row {
    border-top: none;
    padding-top: 4px;
    margin-top: 2px;
  }
  .timer-row.extend-row button {
    font-size: 12px;
    height: 28px;
    padding: 0 10px;
    border-radius: 14px;
    background: rgba(255,149,0,.08);
  }

  /* Collapsible sections */
  .section {
    background: var(--card);
    border-radius: 14px;
    margin-bottom: 8px;
    box-shadow: 0 1px 0 var(--sep);
    overflow: hidden;
  }
  .section > summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 16px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text1);
    display: flex;
    justify-content: space-between;
    align-items: center;
    -webkit-user-select: none;
    user-select: none;
  }
  .section > summary::-webkit-details-marker { display: none; }
  .section > summary::after {
    content: "›";
    font-size: 20px;
    color: var(--text3);
    font-weight: 400;
    line-height: 1;
    display: inline-block;
    transition: transform .2s;
  }
  .section[open] > summary::after { transform: rotate(90deg); }

  .section-body { padding: 0 16px 16px; }

  /* Forms */
  .add-form input[type="text"],
  .add-form input[type="password"],
  #token-bar input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--sep);
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text1);
    font-family: -apple-system, sans-serif;
    -webkit-appearance: none;
    appearance: none;
  }
  .add-form input:focus, #token-bar input:focus {
    outline: none;
    border-color: var(--blue);
  }
  .add-form button {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 12px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    width: 100%;
    font-family: -apple-system, sans-serif;
  }
  .add-form button:active { opacity: .8; }

  .hook-input-wrap {
    display: flex;
    align-items: stretch;
    margin-bottom: 8px;
  }
  .hook-prefix {
    background: rgba(60,60,67,.06);
    padding: 0 10px;
    border: 1.5px solid var(--sep);
    border-right: none;
    border-radius: 10px 0 0 10px;
    font-family: ui-monospace, monospace;
    font-size: 14px;
    color: var(--text2);
    white-space: nowrap;
    display: flex;
    align-items: center;
  }
  .hook-input-wrap input {
    margin-bottom: 0 !important;
    border-radius: 0 10px 10px 0 !important;
    flex: 1;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 12px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }
  .checkbox-label input[type="checkbox"] {
    width: 18px; height: 18px;
    margin: 0; flex-shrink: 0;
    accent-color: var(--blue);
  }

  #token-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #token-bar input {
    flex: 1;
    font-family: ui-monospace, monospace;
    font-size: 13px;
    margin-bottom: 0;
    width: auto;
  }
  #token-bar button {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 11px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    font-family: -apple-system, sans-serif;
    flex-shrink: 0;
  }
  #token-bar button:active { opacity: .8; }

  /* Empty state */
  .empty { text-align: center; color: var(--text3); padding: 40px 0; font-size: 15px; }

  /* Log */
  .log-list { list-style: none; padding: 0; }
  .log-list li {
    padding: 10px 0;
    border-bottom: 1px solid var(--sep);
    font-size: 13px;
    display: flex;
    gap: 8px;
    align-items: baseline;
  }
  .log-list li:last-child { border-bottom: none; }
  .log-time { color: var(--text3); font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .log-param { font-weight: 700; font-family: ui-monospace, monospace; color: var(--text1); }
  .log-action { color: var(--text2); }

  /* Stats */
  .stats-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 12px;
    background: rgba(60,60,67,.08);
    border-radius: 9px;
    padding: 2px;
  }
  .stats-tabs button {
    flex: 1;
    background: none;
    border: none;
    padding: 6px 0;
    border-radius: 7px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
    color: var(--text2);
    font-family: -apple-system, sans-serif;
  }
  .stats-tabs button.active {
    background: var(--card);
    color: var(--text1);
    font-weight: 600;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
  }

  .stats-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .chart-card {
    background: rgba(60,60,67,.04);
    border-radius: 10px;
    padding: 12px;
  }
  .chart-card .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .chart-card .chart-name { font-weight: 700; font-family: ui-monospace, monospace; font-size: 13px; }
  .chart-card .chart-summary { font-size: 12px; color: var(--text2); }
  .chart-bars { display: flex; align-items: flex-end; gap: 2px; height: 60px; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
  .chart-bar { width: 100%; min-width: 3px; background: var(--orange); border-radius: 3px 3px 0 0; transition: height .3s; }
  .chart-bar.zero { background: var(--sep); min-height: 2px; }
  .chart-labels { display: flex; gap: 2px; margin-top: 4px; }
  .chart-labels span { flex: 1; text-align: center; font-size: 10px; color: var(--text3); overflow: hidden; }
  .chart-empty { text-align: center; color: var(--text3); font-size: 14px; padding: 20px 0; }
</style>
</head>
<body>
<div class="container">
  <div id="pull-indicator" class="pull-indicator"></div>
  <h1>Rule Toggle</h1>

  <div id="router-status" class="router-status">
    <div class="router-dot unknown"></div>
    <span class="router-label">Роутер:</span>
    <span class="router-detail">ожидание...</span>
  </div>

  <div id="params"></div>

  <details class="section" id="log-section">
    <summary>История</summary>
    <div class="section-body">
      <ul class="log-list" id="log-list"></ul>
    </div>
  </details>

  <details class="section" id="stats-section">
    <summary>Статистика</summary>
    <div class="section-body">
      <div class="stats-tabs" id="stats-tabs">
        <button onclick="loadStats(1)" data-days="1">1 день</button>
        <button onclick="loadStats(7)" data-days="7" class="active">7 дней</button>
        <button onclick="loadStats(30)" data-days="30">30 дней</button>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
    </div>
  </details>

  <details class="section">
    <summary>Добавить параметр</summary>
    <div class="section-body add-form">
      <div class="hook-input-wrap">
        <span class="hook-prefix">hook:</span>
        <input type="text" id="new-name" placeholder="block-social" />
      </div>
      <input type="text" id="new-desc" placeholder="Описание" />
      <label class="checkbox-label">
        <input type="checkbox" id="new-inverted" /> Kid-control (инверт. логика)
      </label>
      <button onclick="addParam()">Добавить</button>
    </div>
  </details>

  <details class="section">
    <summary>Токен</summary>
    <div class="section-body">
      <div id="token-bar">
        <input type="password" id="token" placeholder="Bearer token" />
        <button onclick="saveToken()">OK</button>
      </div>
    </div>
  </details>
</div>

<script>
let authToken = localStorage.getItem("hook-token") || "";
let currentParams = {};
document.getElementById("token").value = authToken;

function saveToken() {
  authToken = document.getElementById("token").value;
  localStorage.setItem("hook-token", authToken);
  loadState();
}

function headers() {
  const h = {"Content-Type": "application/json"};
  if (authToken) h["Authorization"] = "Bearer " + authToken;
  return h;
}

async function loadState() {
  try {
    const res = await fetch("/api/state", {headers: headers()});
    if (!res.ok) { document.getElementById("params").innerHTML = '<div class="empty">Ошибка: ' + res.status + '</div>'; return; }
    const data = await res.json();
    currentParams = data.params || {};
    render(currentParams);
  } catch (e) {
    document.getElementById("params").innerHTML = '<div class="empty">Не удалось подключиться</div>';
  }
}

function formatCountdown(seconds) {
  if (seconds <= 0) return "0:00";
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return h + ":" + String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  return m + ":" + String(s).padStart(2, "0");
}

function render(params) {
  const el = document.getElementById("params");
  const keys = Object.keys(params).sort();
  if (!keys.length) { el.innerHTML = '<div class="empty">Нет параметров</div>'; return; }
  el.innerHTML = keys.map(k => {
    const p = params[k];
    const inv = p.inverted;
    const hasPending = p.timer_duration && !p.disabled_until;
    const hasTimer = (p.disabled_until || hasPending) && (inv ? p.enabled : !p.enabled);

    let stateClass, badgeClass, badgeText;
    if (hasTimer) {
      stateClass = "timed";
      badgeClass = "timer";
      badgeText = inv ? "врем. выключен" : "врем. разрешено";
    } else if (p.enabled) {
      stateClass = inv ? "inactive" : "active";
      badgeClass = inv ? "allowed" : "blocked";
      badgeText = inv ? "выключен" : "заблокир.";
    } else {
      stateClass = inv ? "active" : "inactive";
      badgeClass = inv ? "blocked" : "allowed";
      badgeText = inv ? "включён" : "разрешено";
    }

    const toggleTitle = inv
      ? (p.enabled ? "Включить" : "Выключить")
      : (p.enabled ? "Разрешить трафик" : "Заблокировать трафик");

    const showTimerButtons = inv ? !p.enabled : p.enabled;

    let timerRow = "";
    if (hasPending) {
      timerRow = `<div class="timer-row timer-active">
        <span class="countdown pending">ожидание роутера…</span>
        <button class="cancel" onclick="cancelTimer('${esc(k)}')">Отмена</button>
      </div>`;
    } else if (hasTimer) {
      timerRow = `<div class="timer-row timer-active">
        <span class="countdown" data-until="${p.disabled_until}"></span>
        <button class="cancel" onclick="cancelTimer('${esc(k)}')">Вернуть</button>
      </div>
      <div class="timer-row extend-row">
        <button onclick="setTimer('${esc(k)}', 5)">+5м</button>
        <button onclick="setTimer('${esc(k)}', 15)">+15м</button>
        <button onclick="setTimer('${esc(k)}', 30)">+30м</button>
        <button onclick="setTimer('${esc(k)}', 60)">+1ч</button>
        <button onclick="setTimer('${esc(k)}', 180)">+3ч</button>
      </div>`;
    } else if (showTimerButtons) {
      timerRow = `<div class="timer-row">
        <button onclick="setTimer('${esc(k)}', 5)">5м</button>
        <button onclick="setTimer('${esc(k)}', 15)">15м</button>
        <button onclick="setTimer('${esc(k)}', 30)">30м</button>
        <button onclick="setTimer('${esc(k)}', 60)">1ч</button>
        <button onclick="setTimer('${esc(k)}', 180)">3ч</button>
        <button onclick="setTimer('${esc(k)}', 360)">6ч</button>
        ${untilBtn(k, 20, 'до 20:00')}
        ${untilBtn(k, 23, 'до 23:00')}
      </div>`;
    }

    const typeLabel = inv ? '<span class="type-label">kid-control</span>' : '';

    return `<div class="card ${stateClass}">
      <div class="card-top">
        <div class="info">
          <div class="name">${esc(k)}${typeLabel}</div>
          <div class="desc">${esc(p.description)}</div>
          <div class="badge-row"><span class="status-badge ${badgeClass}">${badgeText}</span></div>
        </div>
        <label class="toggle" title="${toggleTitle}"><input type="checkbox" ${p.enabled ? "checked" : ""} onchange="toggle('${esc(k)}', this.checked)"><span class="slider"></span></label>
        <button class="delete-btn" onclick="deleteParam('${esc(k)}')" title="Удалить">&times;</button>
      </div>
      ${timerRow}
    </div>`;
  }).join("");
  updateCountdowns();
}

function untilBtn(name, hour, label) {
  const now = new Date();
  const target = new Date(now);
  target.setHours(hour, 0, 0, 0);
  if (target <= now) return "";
  const mins = Math.round((target - now) / 60000);
  if (mins < 5) return "";
  return `<button onclick="setTimer('${esc(name)}', ${mins})">${label}</button>`;
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

async function toggle(name, enabled) {
  const res = await fetch("/api/state", {method: "POST", headers: headers(), body: JSON.stringify({name, enabled})});
  if (res.ok) { const data = await res.json(); currentParams = data.params || {}; render(currentParams); }
}

async function setTimer(name, minutes) {
  const res = await fetch("/api/timer", {method: "POST", headers: headers(), body: JSON.stringify({name, minutes})});
  if (res.ok) { const data = await res.json(); currentParams = data.params || {}; render(currentParams); }
}

async function cancelTimer(name) {
  const p = currentParams[name];
  const restoreEnabled = p && p.inverted ? false : true;
  const res = await fetch("/api/state", {method: "POST", headers: headers(), body: JSON.stringify({name, enabled: restoreEnabled})});
  if (res.ok) { const data = await res.json(); currentParams = data.params || {}; render(currentParams); }
}

async function addParam() {
  const name = document.getElementById("new-name").value.trim();
  const description = document.getElementById("new-desc").value.trim();
  const inverted = document.getElementById("new-inverted").checked;
  if (!name) return;
  const res = await fetch("/api/params", {method: "POST", headers: headers(), body: JSON.stringify({name, description, inverted})});
  if (res.ok) {
    const data = await res.json(); currentParams = data.params || {}; render(currentParams);
    document.getElementById("new-name").value = "";
    document.getElementById("new-desc").value = "";
    document.getElementById("new-inverted").checked = false;
  }
}

async function deleteParam(name) {
  if (!confirm("Удалить параметр " + name + "?")) return;
  const res = await fetch("/api/params?name=" + encodeURIComponent(name), {method: "DELETE", headers: headers()});
  if (res.ok) { const data = await res.json(); currentParams = data.params || {}; render(currentParams); }
}

function updateCountdowns() {
  const els = document.querySelectorAll(".countdown[data-until]");
  const now = Math.floor(Date.now() / 1000);
  els.forEach(el => {
    const until = parseInt(el.dataset.until);
    const remaining = until - now;
    if (remaining <= 0) {
      loadState();
    } else {
      el.textContent = formatCountdown(remaining);
    }
  });
}

function formatAge(sec) {
  if (sec < 60) return sec + " сек назад";
  if (sec < 3600) return Math.floor(sec / 60) + " мин назад";
  if (sec < 86400) return Math.floor(sec / 3600) + " ч назад";
  return Math.floor(sec / 86400) + " дн назад";
}

async function loadHeartbeat() {
  const el = document.getElementById("router-status");
  try {
    const res = await fetch("/api/heartbeat", {headers: headers()});
    if (!res.ok) return;
    const data = await res.json();
    if (!data.last_seen) {
      el.innerHTML = '<div class="router-dot unknown"></div><span class="router-label">Роутер:</span> <span class="router-detail">ещё не подключался</span>';
      return;
    }
    const age = data.age_sec;
    const lastDate = new Date(data.last_seen * 1000);
    const lastTime = String(lastDate.getHours()).padStart(2,"0") + ":" + String(lastDate.getMinutes()).padStart(2,"0") + ":" + String(lastDate.getSeconds()).padStart(2,"0");
    let dotClass, statusText;
    if (age < 120) {
      dotClass = "online";
      statusText = "онлайн · " + lastTime;
    } else if (age < 600) {
      dotClass = "warning";
      statusText = "был " + formatAge(age) + " · " + lastTime;
    } else {
      dotClass = "offline";
      statusText = "нет связи · " + formatAge(age) + " · " + lastTime;
    }
    const scriptWarn = data.script_outdated ? '<span class="script-warn">⚠ Скрипт на роутере устарел — обновите remote-hook.rsc</span>' : '';
    el.innerHTML = `<div class="router-dot ${dotClass}"></div><span class="router-label">Роутер:</span> <span class="router-detail">${statusText}</span>${scriptWarn}`;
  } catch(e) {}
}

async function loadLog() {
  try {
    const res = await fetch("/api/log", {headers: headers()});
    if (!res.ok) return;
    const entries = await res.json();
    const el = document.getElementById("log-list");
    if (!entries || !entries.length) { el.innerHTML = '<li style="color:var(--text3)">Пока пусто</li>'; return; }
    el.innerHTML = entries.map(e => {
      const d = new Date(e.time * 1000);
      const t = String(d.getDate()).padStart(2,"0") + "." + String(d.getMonth()+1).padStart(2,"0") + " " + String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
      return `<li><span class="log-time">${t}</span> <span class="log-param">${esc(e.param)}</span> <span class="log-action">${esc(e.detail)}</span></li>`;
    }).join("");
  } catch(e) {}
}

let currentStatsDays = 7;

async function loadStats(days) {
  if (days) currentStatsDays = days;
  document.querySelectorAll("#stats-tabs button").forEach(b => {
    b.classList.toggle("active", parseInt(b.dataset.days) === currentStatsDays);
  });
  try {
    const res = await fetch("/api/stats?days=" + currentStatsDays, {headers: headers()});
    if (!res.ok) return;
    const data = await res.json();
    const el = document.getElementById("stats-grid");
    const params = Object.keys(data.by_param || {}).sort();
    if (!params.length) { el.innerHTML = '<div class="chart-empty">Нет данных за этот период</div>'; return; }
    el.innerHTML = params.map(k => {
      const p = data.by_param[k];
      const days = p.days || [];
      const maxCount = Math.max(...days.map(d => d.count), 1);
      const totalH = Math.floor(p.total_minutes / 60);
      const totalM = p.total_minutes % 60;
      const timeStr = totalH > 0 ? totalH + "ч " + totalM + "м" : totalM + " мин";

      const barsHtml = days.map(d => {
        const h = d.count > 0 ? Math.max(8, Math.round((d.count / maxCount) * 56)) : 0;
        const cls = d.count > 0 ? "chart-bar" : "chart-bar zero";
        const title = formatDateShort(d.date) + ": " + d.count + " раз";
        return `<div class="chart-bar-wrap"><div class="${cls}" style="height:${h}px" title="${title}"></div></div>`;
      }).join("");

      const labelsHtml = days.map((d, i) => {
        const show = days.length <= 7 || i === 0 || i === days.length - 1 || i === Math.floor(days.length / 2);
        return `<span>${show ? formatDateShort(d.date) : ""}</span>`;
      }).join("");

      return `<div class="chart-card">
        <div class="chart-header">
          <span class="chart-name">${esc(k)}</span>
          <span class="chart-summary">${p.total_timers} раз · ${timeStr}</span>
        </div>
        <div class="chart-bars">${barsHtml}</div>
        <div class="chart-labels">${labelsHtml}</div>
      </div>`;
    }).join("");
  } catch(e) {}
}

function formatDateShort(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return String(d.getDate()).padStart(2,"0") + "." + String(d.getMonth()+1).padStart(2,"0");
}

document.getElementById("log-section").addEventListener("toggle", function() {
  if (this.open) loadLog();
});
document.getElementById("stats-section").addEventListener("toggle", function() {
  if (this.open) loadStats();
});

setInterval(updateCountdowns, 1000);
setInterval(loadState, 30000);
setInterval(loadHeartbeat, 10000);

loadState();
loadHeartbeat();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(function(){});
}

// Pull-to-refresh
(function() {
  let startY = 0;
  let dy = 0;
  let pulling = false;
  let refreshing = false;
  const indicator = document.getElementById("pull-indicator");
  const container = document.querySelector(".container");

  container.addEventListener("touchstart", function(e) {
    if (refreshing) return;
    var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    if (scrollTop <= 0) {
      startY = e.touches[0].pageY;
      pulling = true;
      dy = 0;
      indicator.classList.remove("collapsing");
    }
  }, {passive: true});

  container.addEventListener("touchmove", function(e) {
    if (!pulling || refreshing) return;
    dy = e.touches[0].pageY - startY;
    if (dy > 10) {
      var h = Math.min(dy * 0.5, 50);
      indicator.style.height = h + "px";
      indicator.style.opacity = "1";
      indicator.style.lineHeight = h + "px";
      if (dy > 80) {
        indicator.textContent = "↑ Отпустите для обновления";
        indicator.style.color = "var(--blue)";
        indicator.style.fontWeight = "600";
      } else {
        indicator.textContent = "↓ Потяните для обновления";
        indicator.style.color = "var(--text3)";
        indicator.style.fontWeight = "400";
      }
    }
  }, {passive: true});

  container.addEventListener("touchend", function() {
    if (!pulling || refreshing) return;
    pulling = false;
    if (dy > 80) {
      refreshing = true;
      indicator.textContent = "Обновление...";
      indicator.style.height = "36px";
      indicator.style.opacity = "1";
      indicator.style.lineHeight = "36px";
      indicator.style.color = "var(--blue)";
      indicator.style.fontWeight = "600";
      Promise.all([loadState(), loadHeartbeat()]).finally(function() {
        indicator.classList.add("collapsing");
        indicator.style.height = "0";
        indicator.style.opacity = "0";
        indicator.style.fontWeight = "";
        indicator.style.color = "";
        refreshing = false;
      });
    } else {
      indicator.classList.add("collapsing");
      indicator.style.height = "0";
      indicator.style.opacity = "0";
      indicator.style.fontWeight = "";
      indicator.style.color = "";
    }
    dy = 0;
  }, {passive: true});
})();
</script>
