services:
  hook-server:
    image: ghcr.io/mogilevich/mikrotik-rule-toggle:latest
    ports:
      - "8080:8080"
    environment:
      - LISTEN_ADDR=:8080
      - DATA_DIR=/data
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - HOST_IP=${HOST_IP:-}
    volumes:
      - hook-data:/data
    restart: unless-stopped

volumes:
  hook-data:
